# ============================================================
# ULTIMATE ITAM — Apache 2.4 httpd.conf Settings
# ============================================================
# Copy the relevant sections below into your httpd.conf
# Typical location: C:\Apache24\conf\httpd.conf
# ============================================================


# ------------------------------------------------------------
# STEP 1 — Make sure these modules are UNCOMMENTED (no # in front)
# ------------------------------------------------------------

LoadModule rewrite_module modules/mod_rewrite.so
LoadModule php_module "C:/php/php8apache2_4.dll"   # adjust path to your PHP install


# ------------------------------------------------------------
# STEP 2 — PHP configuration block (add near bottom of httpd.conf)
# ------------------------------------------------------------

PHPIniDir "C:/php"                                  # adjust path to your PHP folder

AddHandler application/x-httpd-php .php
AddType application/x-httpd-php .php


# ------------------------------------------------------------
# STEP 3 — htdocs Directory block
# Find the existing <Directory "C:/Apache24/htdocs"> block
# and make sure it looks like this:
# ------------------------------------------------------------

<Directory "C:/Apache24/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride All       # <-- THIS IS THE IMPORTANT LINE (was "None" by default)
    Require all granted
</Directory>


# ------------------------------------------------------------
# STEP 4 — Optional: Virtual Host for cleaner URL
# Instead of http://localhost/itam_php/ you can use http://itam.local/
# Add this block and also edit C:\Windows\System32\drivers\etc\hosts
# ------------------------------------------------------------

# Add to hosts file:  127.0.0.1   itam.local

<VirtualHost *:80>
    ServerName itam.local
    DocumentRoot "C:/Apache24/htdocs/itam_php"

    <Directory "C:/Apache24/htdocs/itam_php">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog "logs/itam-error.log"
    CustomLog "logs/itam-access.log" combined
</VirtualHost>


# ============================================================
# AFTER EDITING httpd.conf:
# 1. Open Command Prompt as Administrator
# 2. Run: httpd -t        (test config for syntax errors)
# 3. Run: httpd -k restart  (restart Apache)
#    OR use Apache Monitor tray icon → Restart
# ============================================================
